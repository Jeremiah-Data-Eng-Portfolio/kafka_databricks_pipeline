version: 2

models:
  - name: base_silver__chat_parsed
    description: "Source-conformed staging model for parsed chat events from the append-only Silver parsed table."
    columns:
      - name: event_id
        description: "Canonical technical event identifier derived from Kafka topic, partition, and offset."
        data_tests:
          - not_null
      - name: event_ts
        description: "Kafka event timestamp carried into the Silver parsed contract."
      - name: channel
        description: "Normalized Twitch channel identifier."
        data_tests:
          - not_null
      - name: chatter_id
        description: "Normalized chatter identifier."
        data_tests:
          - not_null

  - name: base_silver__chat_features
    description: "Source-conformed staging model for heuristic chat features from the append-only Silver features table."
    columns:
      - name: event_id
        description: "Canonical technical event identifier derived from Kafka topic, partition, and offset."
        data_tests:
          - not_null

  - name: stg_silver__chat_dlq
    description: "Staging model for the chat dead-letter queue, containing events that failed processing in the Silver layer."

  - name: stg_silver__chat_parsed_joins_features
    description: "Business-facing staging model that deduplicates repeated runs by event_id and joins the latest available features onto parsed chat events."
    columns:
      - name: event_id
        description: "Canonical technical event identifier after business-facing deduplication."
        data_tests:
          - not_null
          - unique
