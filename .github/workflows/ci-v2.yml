name: v2 CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install v2 package + dev deps
        run: python -m pip install -e ./v2[dev]

      - name: Run v2 test suite
        env:
          PYTHONPATH: v2/src
        run: pytest -q v2/tests

      - name: Remove Python cache files
        run: |
          find . -type d -name "__pycache__" -prune -exec rm -rf {} +
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

      - name: Fail if cache artifacts remain
        run: |
          if find . -type d -name "__pycache__" | grep -q .; then
            echo "__pycache__ directories still present"
            exit 1
          fi
          if find . -type f \( -name "*.pyc" -o -name "*.pyo" \) | grep -q .; then
            echo "compiled Python artifacts still present"
            exit 1
          fi
